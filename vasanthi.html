<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLNCE Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#eaf2ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.login-box{
    width:400px;
    background:#fff;
    padding:30px;
    border-radius:15px;
    box-shadow:0 8px 20px rgba(0,0,0,.2);
    text-align:center;
}

.logo{
    width:130px;
    height:130px;
    object-fit:contain;
    margin-bottom:15px;
}

h2{
    color:#003366;
    margin-bottom:20px;
}

input{
    width:100%;
    padding:12px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:12px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:16px;
    cursor:pointer;
}

button:hover{
    background:#0056b3;
}

a{
    display:block;
    margin-top:15px;
    text-decoration:none;
    color:#003366;
}
</style>

</head>
<body>

<div class="login-box">

    <img src="images/klnce_logo.png" class="logo" alt="KLNCE Logo">

    <h2>KLN College of Engineering</h2>

    <form>
        <input type="text" placeholder="Username" required>

        <input type="password" placeholder="Password" required>

        <button type="submit">Login</button>
    </form>

    <a href="#">Forgot Password?</a>

</div>

</body>
</html>
