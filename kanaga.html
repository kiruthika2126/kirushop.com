<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>KLN College of Engineering Login</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    background:#dce9ff;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.container{
    width:400px;
    background:#fff;
    border-radius:20px;
    padding:30px;
    text-align:center;
    box-shadow:0 8px 20px rgba(0,0,0,0.25);
}

.logo{
    width:140px;
    height:140px;
    object-fit:contain;
    margin-bottom:10px;
}

h1{
    color:#003366;
    font-size:20px;
    margin-bottom:25px;
}

input{
    width:100%;
    padding:13px;
    margin:10px 0;
    border:1px solid #ccc;
    border-radius:8px;
    font-size:16px;
}

button{
    width:100%;
    padding:13px;
    background:#003366;
    color:white;
    border:none;
    border-radius:8px;
    font-size:17px;
    cursor:pointer;
}

button:hover{
    background:#004f99;
}

a{
    text-decoration:none;
    color:#003366;
    display:block;
    margin-top:18px;
}

a:hover{
    text-decoration:underline;
}
</style>

</head>

<body>

<div class="container">

    <img src="logo.png" alt="KLNCE Logo" class="logo">

    <h1>KLN College of Engineering</h1>

    <form>

        <input type="text"
               placeholder="Enter Username"
               required>

        <input type="password"
               placeholder="Enter Password"
               required>

        <button type="submit">Login</button>

    </form>

    <a href="#">Forgot Password?</a>

</div>

</body>
</html>
